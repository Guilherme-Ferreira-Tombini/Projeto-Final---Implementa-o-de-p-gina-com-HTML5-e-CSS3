<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/header.css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <title>🎮 RETRO GAMES</title>
</head>
<body>
     <header>
        <img src="./assets/image/logo.png" alt="logo" id="logo">

        <input type="checkbox" id="menu-toggle" class="menu-toggle" area-label="abrir menu">

        <label for="menu-toggle" class="menu-icon" area-label="abrir menu">
            <i class="fa-solid fa-bars icon-open"></i>
            <i class="fa-solid fa-xmark icon-close"></i>
        </label>

        <nav class="menu-lateral">
            <ul>
                <li>
                    <a href="#">Início</a>
                </li>

                <li>
                    <a href="#">Gerações de Consoles</a>
                </li>

                <li>
                    <a href="#">Evolução dos Gráficos</a>
                </li>

                <li>
                    <a href="#">Melhores Jogos</a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="welcome-site">
            <section class="text">
                <div class="text-container">
                    <h1 class="color-text-primary">
                        Reviva os Clássicos!
                    </h1>
                    <p class="color-text-secundary">
                        Relembre os consoles e jogos que marcaram época.
                    </p>
                    <button class="bg-components">Saiba mais</button>
                </div>
            </section>

            <div class="imagem">
                <img src="assets/image/nintendo.png" alt="Ilustração do Nintendo de 1985">
            </div>
        </section>
    </main>
</body>
</html>
